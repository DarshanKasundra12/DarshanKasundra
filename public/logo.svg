  <path d="M555 188 L556.5 185 L558 188 L561 189.5 L558 191 L556.5 194 L555 191 L552 189.5 Z" fill="#7AD4FF" opacity="0.7" style="fill:rgb(122, 212, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</g>

